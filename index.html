<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Prep - Daily Practice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<!-- Firebase (cloud sync) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  /* KaTeX sizing: bump up from default 1.21em and add breathing room */
  .katex { font-size: 1.35em !important; }
  .katex .mfrac .frac-line { border-bottom-width: 0.06em !important; }
  .katex .mord + .mbin, .katex .mbin + .mord { margin: 0 0.28em !important; }
</style>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e7ef;
    --text2: #9499ad;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --red: #ff6b6b;
    --orange: #fdcb6e;
    --blue: #74b9ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* Navigation */
  .nav { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .nav-btn { padding: 14px 24px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

  /* Layout */
  .container { max-width: 1350px; margin: 0 auto; padding: 24px; }
  .container.quiz-active { max-width: 1350px; }
  @media (max-width: 900px) { .container { max-width: 100%; padding: 12px; } }
  .coaching-split { display: flex; gap: 24px; align-items: flex-start; width: 100%; overflow: hidden; }
  .coaching-left { width: 340px; flex: 0 0 340px; overflow: hidden; }
  .coaching-right { flex: 1 1 0; min-width: 0; overflow: hidden; }
  @media (max-width: 1100px) { .coaching-split { flex-direction: column; } .coaching-left { width: 100%; flex: 0 0 auto; } }
  .coaching-answer-box { padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
  .coaching-section { margin-bottom: 20px; }
  .coaching-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card h2 { font-size: 20px; margin-bottom: 16px; color: var(--text); }
  .card h3 { font-size: 16px; margin-bottom: 12px; color: var(--text2); }

  /* Buttons */
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-success { background: var(--green); color: var(--bg); }
  .btn-success:hover { opacity: 0.85; }
  .btn-small { padding: 6px 14px; font-size: 12px; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Forms */
  input, textarea, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-size: 14px; width: 100%;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 48px; }
  select { cursor: pointer; }
  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
  .form-row { margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Quiz */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .timer { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer.warning { color: var(--orange); }
  .timer.danger { color: var(--red); }
  @keyframes pulse { 50% { opacity: 0.6; } }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 20px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .question-meta { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .tag-math { background: #2d3a8c33; color: var(--blue); }
  .tag-rw { background: #6c5ce733; color: var(--accent2); }
  .tag-hard { background: #ff6b6b22; color: var(--red); }
  .tag-source { background: #00cec922; color: var(--green); font-size: 10px; }
  .tag-dryrun { background: #fdcb6e33; color: var(--orange); font-weight: 700; }
  .tag-medium { background: #fdcb6e22; color: var(--orange); }
  .question-text { font-size: 17px; line-height: 1.7; margin-bottom: 20px; white-space: pre-wrap; }
  .passage-text { font-size: 15px; line-height: 1.8; margin-bottom: 20px; padding: 16px; background: var(--surface2); border-radius: 8px; white-space: pre-wrap; }

  /* Answer choices */
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; line-height: 1.5; transition: all 0.15s; color: var(--text); }
  .choice-btn:hover { border-color: var(--accent); background: #6c5ce711; }
  .choice-btn.selected { border-color: var(--accent); background: #6c5ce722; }
  .choice-btn.correct { border-color: var(--green); background: #00cec922; }
  .choice-btn.incorrect { border-color: var(--red); background: #ff6b6b22; }
  .choice-letter { min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--border); font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .choice-btn.selected .choice-letter { background: var(--accent); color: white; }
  .choice-btn.correct .choice-letter { background: var(--green); color: var(--bg); }
  .choice-btn.incorrect .choice-letter { background: var(--red); color: white; }
  .choice-btn.struck { opacity: 0.4; text-decoration: line-through; }
  .choice-btn.struck .choice-letter { background: #666; text-decoration: line-through; }
  .strike-toggle { flex-shrink: 0; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; font-size: 14px; color: var(--text2); background: transparent; transition: all 0.15s; margin-left: 12px; }
  .strike-toggle:hover { border-color: var(--red); color: var(--red); background: #ff6b6b11; }
  .strike-toggle.active { border-color: var(--red); color: var(--red); background: #ff6b6b22; }

  /* Free response */
  .free-response { display: flex; gap: 8px; align-items: center; }
  .free-response input { max-width: 300px; font-size: 18px; text-align: center; }

  /* Score */
  .score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .score-number { font-size: 42px; font-weight: 800; }
  .score-label { font-size: 13px; color: var(--text2); }

  /* Review */
  .review-item { padding: 16px; border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); }
  .review-item.correct-item { border-left: 3px solid var(--green); }
  .review-item.incorrect-item { border-left: 3px solid var(--red); }
  .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .review-expand { cursor: pointer; }
  .review-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

  /* Recording */
  .record-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .record-btn.idle { background: var(--red); }
  .record-btn.recording { background: var(--red); animation: pulse 0.8s infinite; }
  .record-btn svg { width: 20px; height: 20px; fill: white; }

  /* Analytics */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface2); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 800; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .domain-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .domain-name { width: 180px; font-size: 13px; text-align: right; color: var(--text2); }
  .domain-fill-bg { flex: 1; height: 24px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .domain-fill { height: 100%; border-radius: 4px; transition: width 0.5s; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; }

  /* Question Bank */
  .qb-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .qb-item:last-child { border-bottom: none; }
  .qb-id { color: var(--text2); min-width: 70px; }
  .qb-section { min-width: 60px; }
  .qb-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text2); }
  .qb-actions { display: flex; gap: 4px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: #000a; z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
  .modal.modal-wide { max-width: 1020px; }
  .modal.modal-split { max-width: 95vw; width: 95vw; max-height: 92vh; padding: 16px; overflow: hidden; display: flex; flex-direction: column; }
  .split-layout { display: flex; gap: 16px; flex: 1; min-height: 0; overflow: hidden; }
  .split-pdf { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #fff; }
  .split-pdf iframe, .split-pdf embed { width: 100%; height: 100%; border: none; }
  .split-content { flex: 1; min-width: 0; overflow-y: auto; padding-right: 8px; }
  .split-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
  .modal h2 { margin-bottom: 20px; }
  .fmt-toolbar { display: flex; gap: 4px; margin-bottom: 4px; }
  .fmt-toolbar button { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 12px; cursor: pointer; color: var(--text); font-weight: 500; line-height: 1.4; }
  .fmt-toolbar button:hover { background: var(--accent); color: var(--bg); }

  /* Mistake Journal */
  .journal-entry { padding: 14px; background: var(--surface2); border-radius: 10px; margin-bottom: 10px; }
  .journal-date { font-size: 12px; color: var(--text2); }
  .journal-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: var(--bg); padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 300; animation: slideIn 0.3s; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } }

  /* Setup screen */
  .setup-center { text-align: center; padding: 40px 0; }
  .setup-center h1 { font-size: 32px; margin-bottom: 8px; }
  .setup-center p { color: var(--text2); margin-bottom: 32px; }
  .setup-options { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .setup-card { background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 24px; cursor: pointer; width: 200px; text-align: center; transition: all 0.15s; }
  .setup-card:hover { border-color: var(--accent); }
  .setup-card.selected { border-color: var(--accent); background: #6c5ce722; }
  .setup-card h3 { margin-bottom: 4px; }
  .setup-card p { font-size: 13px; color: var(--text2); margin-bottom: 0; }

  .empty-state { text-align: center; padding: 48px; color: var(--text2); }
  .empty-state h3 { margin-bottom: 8px; color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .inline-flex { display: flex; align-items: center; gap: 8px; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-orange { color: var(--orange); }
  .text-blue { color: var(--blue); }
  .text-muted { color: var(--text2); }
  .mt-2 { margin-top: 8px; }
  .mt-4 { margin-top: 16px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-4 { margin-bottom: 16px; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .gap-2 { gap: 8px; }
</style>
</head>

<div id="root"></div>
<script>const{useState,useEffect,useRef,useCallback,useMemo}=React;// ==================== MATH RENDERING ====================
// autoFormatMath: converts plain-text math expressions to KaTeX-ready notation
// Call this when saving/importing questions so stored text is KaTeX-ready
// ==================== FREE-RESPONSE ANSWER CHECKER ====================
// Handles: multiple accepted answers (comma-separated), fractions, decimals, negative numbers,
// leading/trailing whitespace, and numeric equivalence (e.g. "16/17" matches ".9411")
function checkFreeResponse(userAnswer,correctAnswerField){if(!userAnswer||!correctAnswerField)return false;const userRaw=userAnswer.toString().trim();if(userRaw.length===0)return false;// Parse the correctAnswer field: split on comma to get all accepted forms
// But be careful: "1,200" is a single number with a thousands separator, not two answers "1" and "200"
// Strategy: split on ", " (comma+space) which is the delimiter used in the data
const acceptedForms=correctAnswerField.toString().split(/,\s+/).map(s=>s.trim()).filter(Boolean);// Normalize a string to a numeric value (returns NaN if not numeric)
const toNum=s=>{// Strip KaTeX delimiters if present
let clean=s.replace(/^\$+|\$+$/g,'').trim();// Handle fractions like "16/17" or "-49/150"
const fracMatch=clean.match(/^(-?\d+(?:\.\d+)?)\s*\/\s*(-?\d+(?:\.\d+)?)$/);if(fracMatch)return parseFloat(fracMatch[1])/parseFloat(fracMatch[2]);// Handle thousands separators: remove commas in numbers like "1,200"
clean=clean.replace(/,/g,'');const num=parseFloat(clean);return isNaN(num)?NaN:num;};// String match (case-insensitive, trimmed) — handles "either" and text answers
const userLower=userRaw.toLowerCase();for(const accepted of acceptedForms){if(userLower===accepted.toLowerCase())return true;}// Numeric match — evaluate user input and each accepted form as numbers
const userNum=toNum(userRaw);if(!isNaN(userNum)){for(const accepted of acceptedForms){const accNum=toNum(accepted);if(!isNaN(accNum)){// Use tolerance for floating-point: match to 3 decimal places
if(Math.abs(userNum-accNum)<0.001)return true;}}}return false;}function autoFormatMath(text){if(!text)return text;// If text already has KaTeX commands, skip the "pure math" whole-text wrap (Step 3)
// but still process inline patterns (Step 2 unicode, mixed-content fractions, etc.)
const hasExistingKaTeX=/\\frac|\\sqrt|\\geq|\\leq|\\times/.test(text);let out=text;// Step 1: Protect escaped currency \$N (e.g. \$21) from being eaten by KaTeX
// ONLY escaped \$ is currency. Unescaped $N is always math.
const currencies=[];out=out.replace(/\\\$(\d[\d,.]*(?:\([^)]*\))?)/g,function(m,num){currencies.push(num);return'__CUR'+(currencies.length-1)+'__';});// Step 2: Unicode math symbols → LaTeX commands
out=out.replace(/²/g,'^{2}').replace(/³/g,'^{3}').replace(/⁴/g,'^{4}');out=out.replace(/≥/g,'\\geq ').replace(/≤/g,'\\leq ').replace(/≠/g,'\\neq ');out=out.replace(/×/g,'\\times ').replace(/÷/g,'\\div ').replace(/·/g,'\\cdot ');out=out.replace(/π/g,'\\pi ').replace(/θ/g,'\\theta ').replace(/∞/g,'\\infty ');// Step 3: Detect if ENTIRE text is a math expression (common for answer choices)
// e.g. "f(n) = 14n + 175" or "(4x^2)/(x^2-9) - (2x)/(x+3) = 1/(x-3)" or "-3" or "1/2"
var trimmed=out.trim();var looksLikePureMath=// f(x) = expression
/^[a-zA-Z]\([a-zA-Z]\)\s*=/.test(trimmed)||// starts with ( and has / (fraction equation)
/^\(/.test(trimmed)&&/\/\s*\(/.test(trimmed)||// simple number/fraction: -3, 1/2, -1/2
/^-?\d+(?:\s*\/\s*\d+)?$/.test(trimmed)||// coefficient expression: 14n + 175
/^\d+[a-zA-Z]\s*[\+\-]/.test(trimmed)||// single variable equation: x = 3
/^[a-zA-Z]\s*=\s*\d/.test(trimmed);// But not if it has sentence-like content (periods followed by spaces, "the", "which", etc.)
var looksLikeProse=/\.\s+[A-Z]|which|that|the\s|how\s|what\s/i.test(trimmed);if(looksLikePureMath&&!looksLikeProse&&!hasExistingKaTeX&&trimmed.length<120){// Wrap entire text as one math block
var math=trimmed;// Convert (a)/(b) → \frac{a}{b}
math=math.replace(/\(([^()]+)\)\s*\/\s*\(([^()]+)\)/g,'\\frac{$1}{$2}');// Convert number/(expr): 1/(x-3) → \frac{1}{x-3}, -1/(x-3) → -\frac{1}{x-3}
math=math.replace(/(-?)(\d+)\s*\/\s*\(([^()]+)\)/g,function(m,sign,num,den){return sign+'\\frac{'+num+'}{'+den+'}';});// Convert (expr)/number: (2x)/3 → \frac{2x}{3}
math=math.replace(/\(([^()]+)\)\s*\/\s*(-?)(\d+)/g,function(m,num,sign,den){return sign+'\\frac{'+num+'}{'+den+'}';});// Convert simple fractions: 1/2 → \frac{1}{2}, -1/2 → -\frac{1}{2} (but not inside \frac already)
math=math.replace(/(?<!\\frac\{[^}]*)(?<![a-zA-Z])(-?)(\d+)\s*\/\s*(\d+)(?![a-zA-Z}])/g,function(m,sign,num,den){return sign+'\\frac{'+num+'}{'+den+'}';});out='$'+math+'$';}else{// Mixed prose + math (or already has KaTeX): wrap individual math segments
// but don't touch content already inside $...$
// Convert (a)/(b) fractions NOT already inside $...$
out=out.replace(/(?<!\$[^$]*)\(([^()]+)\)\s*\/\s*\(([^()]+)\)(?![^$]*\$)/g,function(m,n,d){return'$\\frac{'+n+'}{'+d+'}$';});// Convert number/(expr): 1/(x-3) → $\frac{1}{x-3}$, -1/(x-3) → $-\frac{1}{x-3}$ when not inside $...$
out=out.replace(/(?<!\$)(-?)(\d+)\s*\/\s*\(([^()]+)\)(?![^$]*\$)/g,function(m,sign,num,den){return'$'+sign+'\\frac{'+num+'}{'+den+'}$';});// Convert (expr)/number: (2x)/3 → $\frac{2x}{3}$ when not inside $...$
out=out.replace(/(?<!\$)\(([^()]+)\)\s*\/\s*(-?)(\d+)(?![^$]*\$)/g,function(m,num,sign,den){return'$'+sign+'\\frac{'+num+'}{'+den+'}$';});// Convert "n \geq 25" or "n \leq 10" inline — but skip if already inside $...$
out=out.replace(/(?<!\$)([a-zA-Z])\s*\\geq\s+(\d+)(?!\$)/g,function(m,v,num){return'$'+v+' \\geq '+num+'$';});out=out.replace(/(?<!\$)([a-zA-Z])\s*\\leq\s+(\d+)(?!\$)/g,function(m,v,num){return'$'+v+' \\leq '+num+'$';});}// Step 4: Normalize negative fractions — move minus sign outside \frac
// \frac{-N}{...} → -\frac{N}{...} so the minus renders at fraction-bar level
out=out.replace(/\\frac\{-(\d+)/g,'-\\frac{$1');// Step 5: Restore currency — keep \$ escape so MathText knows it's currency, not math
currencies.forEach(function(num,i){out=out.replace('__CUR'+i+'__','\\$'+num);});return out;}// MathText: renders any text containing $...$ (inline) or $$...$$ (display) as KaTeX equations
// Smart about currency: $21 is NOT math, but $x^2 + 3x = 0$ IS
function MathText({text,style,className}){const ref=useRef(null);useEffect(()=>{if(!ref.current||!text||typeof katex==='undefined')return;// Step 0a: Convert simple percentage math to plain text (e.g. $100 \%$ → 100%)
// These don't need KaTeX rendering and look oversized when rendered as math.
text=text.replace(/\$([\d,.]+)\s*\\?%\$/g,function(m,num){return num+'%';});// Step 0b: Handle escaped currency \$N (e.g. \$21, \$14) — replace with placeholder before math parsing
// ONLY escaped \$ is treated as currency. Unescaped $N is always math (e.g. $20^{\circ}$).
const currencyStore=[];let safeText=text.replace(/\\\$(\d[\d,.]*(?:\([^)]*\))?)/g,function(m,num){currencyStore.push(num);return'\x00CUR'+(currencyStore.length-1)+'\x00';});// Parse into segments: plain text, display math ($$...$$), inline math ($...$)
const parts=[];let remaining=safeText;// Match $$...$$ first (display), then $...$ (inline)
const regex=/\$\$([\s\S]*?)\$\$|\$((?:[^$\\]|\\.)+?)\$/g;let match,lastIdx=0;while((match=regex.exec(remaining))!==null){if(match.index>lastIdx)parts.push({type:'text',content:remaining.slice(lastIdx,match.index)});if(match[1]!==undefined){// Display math $$...$$
